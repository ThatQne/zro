name: release

# Push a version tag (e.g. `git tag v0.1.1 && git push --tags`) to build a
# signed Windows installer, publish a GitHub Release, and generate the
# `latest.json` the in-app auto-updater reads.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # minisign private key used to sign the updater bundle. Add it as a
          # repo secret (Settings ▸ Secrets ▸ Actions). Empty password key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "zro ${{ github.ref_name }}"
          releaseBody: "Download the `.exe` installer below. Existing installs update automatically."
          releaseDraft: false
          prerelease: false

      # tauri-action above publishes the stock NSIS installer (needed as-is —
      # the updater's latest.json/signature point at it). This app's real
      # first-run download is zro-installer (see zro-installer/README.md):
      # a themed Tauri app that downloads+extracts a portable zip. Neither
      # existed as release assets until now — build and attach both.
      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path stage/icons | Out-Null
          Copy-Item src-tauri/target/release/zro.exe stage/
          Copy-Item src-tauri/icons/icon.png stage/icons/
          Compress-Archive -Path stage/* -DestinationPath zro-portable.zip -Force

      - name: Install zro-installer deps
        working-directory: zro-installer
        run: pnpm install --no-frozen-lockfile

      - name: Build themed installer
        working-directory: zro-installer
        run: pnpm tauri build

      - name: Upload installer assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $nsis = Get-ChildItem -Path "zro-installer/src-tauri/target/release/bundle/nsis" -Filter *-setup.exe | Select-Object -First 1
          Copy-Item $nsis.FullName "zro-Setup.exe"
          gh release upload ${{ github.ref_name }} zro-portable.zip zro-Setup.exe --clobber
