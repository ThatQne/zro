name: release

# Manual fallback only — the primary release path is now tools/publish.ps1,
# which builds + signs + publishes locally (faster, and lets you smoke-test
# the installer before it goes public). Run this by hand from the Actions
# tab if you ever need a clean-room build. NOTE: TAURI_SIGNING_PRIVATE_KEY
# (repo secret) must match the pubkey currently in src-tauri/tauri.conf.json
# — they were regenerated locally on 2026-07-19 and the secret was NOT
# updated to match, so this workflow will currently produce a mismatched
# signature. Update the secret before relying on this again.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # minisign private key used to sign the updater bundle. Add it as a
          # repo secret (Settings ▸ Secrets ▸ Actions). Empty password key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "zro ${{ github.ref_name }}"
          releaseBody: "Download the `.exe` installer below. Existing installs update automatically."
          releaseDraft: false
          prerelease: false

      # tauri-action above publishes the stock NSIS installer (needed as-is —
      # the updater's latest.json/signature point at it). The themed installer
      # (zro-Setup.exe) and its zro-portable.zip payload are built LOCALLY by
      # tools/publish.ps1 — that source lives off-repo now, so this fallback
      # can only attach the portable zip.
      - name: Package portable zip
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path stage/icons | Out-Null
          Copy-Item src-tauri/target/release/zro.exe stage/
          Copy-Item src-tauri/icons/icon.png stage/icons/
          Compress-Archive -Path stage/* -DestinationPath zro-portable.zip -Force
          gh release upload ${{ github.ref_name }} zro-portable.zip --clobber
